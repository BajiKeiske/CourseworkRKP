<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <title th:text="${bundle.name}">Детали комплекта</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="site-header">
  <div class="container header-content">
    <a href="/" class="logo">Vinyl</a>
    <div class="user-nav" sec:authorize="isAuthenticated()">
      <span sec:authorize="hasRole('ADMIN')" style="background: rgba(255,255,255,0.2); padding:5px 10px; border-radius:4px;">Администратор</span>
      <span sec:authorize="hasRole('USER')">
        <a href="/user/products/catalog">Каталог</a>
        <a href="/basket">Корзина</a>
        <a href="/user/profile">Профиль</a>
      </span>
      <span sec:authorize="hasRole('ADMIN')"><a href="/admin/bundles">Управление</a></span>
      <form method="post" action="/logout" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="nav-link-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
      </form>
    </div>
    <div class="user-nav" sec:authorize="!isAuthenticated()">
      <a href="/login">Войти</a>
      <a href="/register">Регистрация</a>
    </div>
  </div>
</header>

<div class="container">
  <!-- Кнопка назад -->
  <div style="margin: 20px 0;">
    <a href="javascript:history.back()" class="btn btn-secondary" style="display: inline-flex; align-items: center; gap: 8px;">
      <i class="fas fa-arrow-left"></i> Назад
    </a>
  </div>

  <div class="product-details">
    <img th:if="${bundle.imageUrl != null}" th:src="${bundle.imageUrl}" class="product-image">
    <h1 th:text="${bundle.name}" class="product-title"></h1>
    <p th:text="${bundle.description}" class="product-description"></p>

    <!-- Срок акции -->
    <div class="detail-row" th:if="${bundle.startDate != null or bundle.endDate != null}">
      <span class="detail-label">Срок акции:</span>
      <span class="detail-value">
        <span th:if="${bundle.startDate != null}" th:text="${#dates.format(bundle.startDate, 'dd.MM.yyyy')}"></span>
        <span th:if="${bundle.endDate != null}"> — <span th:text="${#dates.format(bundle.endDate, 'dd.MM.yyyy')}"></span></span>
      </span>
    </div>

    <h3>Состав комплекта:</h3>
    <div class="products-grid" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
      <div th:each="item : ${bundle.items}" class="product-card">
        <img th:if="${item.product.imageUrl != null}" th:src="${item.product.imageUrl}" class="product-image">
        <h4 th:text="${item.product.name}"></h4>
        <p th:text="'Кол-во: ' + ${item.quantity}"></p>
        <p class="product-price" th:text="${#numbers.formatDecimal(item.product.price, 0, 2)} + ' ₽'"></p>
        <a th:href="@{/user/products/details/{id}(id=${item.product.id})}" class="btn btn-primary btn-sm">Подробнее</a>
      </div>
    </div>

    <div class="details-card">
      <div class="detail-row">
        <span class="detail-label">Скидка:</span>
        <span class="detail-value">
          <span th:if="${bundle.discountType == 'PERCENT'}" th:text="'-' + ${bundle.discountValue} + '%'"></span>
          <span th:if="${bundle.discountType == 'FIXED'}" th:text="'-' + ${bundle.discountValue} + ' ₽'"></span>
        </span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Цена комплекта:</span>
        <span class="detail-value" style="font-size: 24px; color: #d4a574;" th:text="${#numbers.formatDecimal(bundle.finalPrice, 0, 2)} + ' ₽'"></span>

        <span th:if="${bundle.startDate != null and bundle.endDate != null}">
          <span th:if="${#dates.createNow().before(bundle.endDate) and #dates.createNow().after(bundle.startDate)}" style="color: green;">Акция действует</span>
          <span th:if="${#dates.createNow().after(bundle.endDate)}" style="color: gray;">Акция завершена</span>
      </span>
      </div>
    </div>

    <th:block th:with="allInStock=${#lists.stream(bundle.items).allMatch(item -> item.product.stock != null && item.product.stock > 0)}">
      <form sec:authorize="hasRole('USER')" th:if="${allInStock}" th:action="@{/basket/add-bundle}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="bundleId" th:value="${bundle.id}">
        <button type="submit" class="btn btn-success btn-lg">Добавить в корзину</button>
      </form>
      <div sec:authorize="hasRole('USER')" th:unless="${allInStock}" class="alert alert-warning">
         Данный комплект временно недоступен: один из товаров закончился
      </div>
    </th:block>

    <!-- Оставляем для неавторизованных -->
    <div sec:authorize="isAnonymous()" class="card">
      <p>Войдите, чтобы купить комплект</p>
      <a href="/login" class="btn btn-primary">Войти</a>
    </div>
  </div>
</div>
</body>
</html>
