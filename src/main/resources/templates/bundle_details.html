<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <title th:text="${bundle.name}">Детали комплекта</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="site-header">
  <div class="container header-content">

    <a sec:authorize="isAnonymous()" href="/bundles" class="logo">Vinyl</a>
    <a sec:authorize="hasRole('USER')" href="/bundles" class="logo">Vinyl</a>
    <a sec:authorize="hasRole('ADMIN')" href="/admin/bundles" class="logo">Vinyl</a>

    <div class="user-nav" sec:authorize="isAuthenticated()">

      <span sec:authorize="hasRole('ADMIN')"
            style="background: rgba(255,255,255,0.2); padding:5px 10px; border-radius:4px;">
        Администратор
      </span>

      <span sec:authorize="hasRole('USER')">
        <a href="/bundles">Комплекты</a>
        <a href="/basket">Корзина</a>
        <a href="/user/profile">Профиль</a>
      </span>

      <span sec:authorize="hasRole('ADMIN')">
        <a href="/admin/bundles">Управление</a>
      </span>

      <form method="post" action="/logout" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="nav-link-btn">Выйти</button>
      </form>

    </div>
  </div>
</header>


<div class="container">

  <h1 class="product-title" th:text="${bundle.name}"></h1>

  <img th:if="${bundle.imageUrl != null}"
       th:src="${bundle.imageUrl}"
       style="max-width:300px; border-radius: 16px; margin-bottom: 20px;">

  <p th:text="${bundle.description}" class="mb-4"></p>

  <h3>Товары в комплекте:</h3>

  <table class="table">
    <thead>
    <tr>
      <th>Товар</th>
      <th>Количество</th>
      <th>Цена</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="item : ${bundle.items}">
      <td th:text="${item.product.name}"></td>
      <td th:text="${item.quantity}"></td>
      <td th:text="${#numbers.formatDecimal(item.product.price, 0, 2)} + ' ₽'"></td>
    </tr>
    </tbody>
  </table>


  <div class="details-card">

    <div class="detail-row">
      <span class="detail-label">Скидка:</span>
      <span class="detail-value">

        <span th:if="${bundle.discountType == 'PERCENT'}"
              th:text="'-' + ${bundle.discountValue} + '%'"></span>

        <span th:if="${bundle.discountType == 'FIXED'}"
              th:text="'-' + ${bundle.discountValue} + ' ₽'"></span>

        <span th:if="${bundle.discountType == null}">
          Нет скидки
        </span>

      </span>
    </div>

  </div>


  <div class="mt-4">

    <form sec:authorize="hasRole('USER')" action="/basket/add-bundle" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" name="bundleId" th:value="${bundle.id}">
      <button type="submit" class="btn btn-success">
        Добавить в корзину
      </button>
    </form>

    <div sec:authorize="isAnonymous()" class="card">
      <p>Войдите, чтобы купить комплект</p>
      <a href="/login" class="btn btn-primary">Войти</a>
    </div>

  </div>

</div>

</body>
</html>
