<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Vinyl</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="site-header">
    <div class="container header-content">
        <a href="/" class="logo">Vinyl</a>
        <a href="/user/products/catalog" class="nav-link"
           style="color: #808000; text-decoration: none; margin-left: 20px;">Каталог</a>
    </div>
</header>

<div class="container">
    <h1>Регистрация</h1>

    <div th:if="${error}" class="card"
         style="background: rgba(189,66,82,0.1); border-left:4px solid #bd4252; margin-bottom:20px;">
        <p style="color:#bd4252;margin:0;" th:text="${error}"></p>
    </div>

    <div class="form-container w-50">
        <form method="post" action="/register">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label class="form-label">ФИО</label>
                <input type="text" name="fullName" class="form-control" th:value="${fullName}"
                       placeholder="Иванов Иван Иванович" required>
            </div>

            <div class="form-group">
                <label for="username" class="form-label">Логин</label>
                <input type="text" id="username" name="username" class="form-control" th:value="${username}"
                       minlength="3" maxlength="30" placeholder="Например: vinyl_fan" required>
                <small class="form-hint">От 3 до 30 символов</small>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" th:value="${email}"
                       placeholder="example@mail.ru" required>
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Телефон</label>
                <input type="tel" id="phone" name="phone" class="form-control"
                       th:value="${phone}"
                       placeholder="+7 (999) 123-45-67"
                       pattern="^(\+7|8)?\d{10}$"
                       title="Введите номер в формате: +7XXXXXXXXXX или 8XXXXXXXXXX"
                       required>
                <small class="form-hint">Для связи и доставки</small>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control" required
                           style="padding-right: 40px;">
                    <button type="button" onclick="togglePassword('password', this)"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; padding: 0; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-regular fa-eye" style="font-size: 18px;"></i>
                    </button>
                </div>
                <small class="form-hint">Минимум 8 символов, большая и маленькая буква, цифра</small>
                <div id="password-strength" class="password-strength" style="margin-top:8px;">Введите пароль</div>
                <button type="button" class="btn btn-outline-secondary btn-sm" style="margin-top:10px;"
                        onclick="generatePassword()">Сгенерировать пароль
                </button>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Повторите пароль</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required
                           style="padding-right: 40px;">
                    <button type="button" onclick="togglePassword('confirmPassword', this)"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; padding: 0; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-regular fa-eye" style="font-size: 18px;"></i>
                    </button>
                </div>
                <small id="password-match-hint" class="form-hint" style="color: #6c757d;">Пароли должны
                    совпадать</small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">Зарегистрироваться</button>
        </form>

        <div class="auth-links">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const strengthText = document.getElementById("password-strength");
    const matchHint = document.getElementById("password-match-hint");

    function checkPasswordStrength(value) {
        let score = 0;
        if (value.length >= 8) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[a-z]/.test(value)) score++;
        if (/\d/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;

        if (score <= 2) {
            strengthText.textContent = "Слабый пароль";
            strengthText.style.color = "#bd4252";
            return false;
        } else if (score <= 4) {
            strengthText.textContent = "Средний пароль";
            strengthText.style.color = "#ff9800";
            return true;
        } else {
            strengthText.textContent = "Надёжный пароль";
            strengthText.style.color = "#4caf50";
            return true;
        }
    }

    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        if (confirm.length === 0) {
            matchHint.textContent = "Повторите пароль";
            matchHint.style.color = "#6c757d";
            return false;
        }
        if (password === confirm) {
            matchHint.textContent = "Пароли совпадают";
            matchHint.style.color = "#4caf50";
            return true;
        } else {
            matchHint.textContent = "Пароли не совпадают";
            matchHint.style.color = "#bd4252";
            return false;
        }
    }

    passwordInput.addEventListener("input", function() {
        checkPasswordStrength(passwordInput.value);
        checkPasswordMatch();
    });
    confirmInput.addEventListener("input", function() {
        checkPasswordMatch();
    });

    function generatePassword() {
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*";
        const all = upper + lower + numbers + symbols;
        let password = "";
        password += upper[Math.floor(Math.random() * upper.length)];
        password += lower[Math.floor(Math.random() * lower.length)];
        password += numbers[Math.floor(Math.random() * numbers.length)];
        password += symbols[Math.floor(Math.random() * symbols.length)];
        for (let i = 0; i < 8; i++) {
            password += all[Math.floor(Math.random() * all.length)];
        }
        password = password.split("").sort(() => Math.random() - 0.5).join("");
        passwordInput.value = password;
        confirmInput.value = password;
        passwordInput.dispatchEvent(new Event("input"));
        confirmInput.dispatchEvent(new Event("input"));
    }
</script>
</body>
</html>
