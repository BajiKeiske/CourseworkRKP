<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказ | Vinyl</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/orders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header class="site-header">
    <div class="container header-content">
        <a href="/user/products/catalog" class="logo">Vinyl</a>
        <div class="user-nav">
            <a href="/user/products/catalog"><i class="fas fa-store"></i> Каталог</a>
            <a href="/basket"><i class="fas fa-shopping-cart"></i> Корзина</a>
            <a href="/user/profile"><i class="fas fa-user"></i> Профиль</a>
            <form method="post" action="/logout" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</header>
<div class="container">
    <div class="mb-3">
        <a href="/user/orders" class="btn btn-secondary">Назад к заказам</a>
    </div>

    <div class="card mb-4">
        <div class="flex justify-between align-center">
            <div>
                <h1 style="margin-bottom:10px;">Заказ №<span th:text="${order.id}"></span></h1>
                <p class="text-muted" th:text="${#temporals.format(order.orderDate,'dd.MM.yyyy HH:mm')}"></p>
            </div>
            <div>
                <span class="badge badge-warning" th:if="${order.status.name() == 'NEW'}">НОВЫЙ</span>
                <span class="badge badge-info" th:if="${order.status.name() == 'PAID'}">ОПЛАЧЕН</span>
                <span class="badge badge-primary" th:if="${order.status.name() == 'ASSEMBLY'}">В СБОРКЕ</span>
                <span class="badge badge-primary" th:if="${order.status.name() == 'READY_FOR_DELIVERY'}">ГОТОВ К ДОСТАВКЕ</span>
                <span class="badge badge-success" th:if="${order.status.name() == 'COMPLETED'}">ВЫПОЛНЕН</span>
                <span class="badge badge-danger" th:if="${order.status.name() == 'CANCELLED'}">ОТМЕНЁН</span>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <h3>Информация о заказе</h3>
        <div class="detail-row"><span class="detail-label">Получатель:</span><span class="detail-value" th:text="${order.recipientName}"></span></div>
        <div class="detail-row"><span class="detail-label">Телефон:</span><span class="detail-value" th:text="${order.phone}"></span></div>
        <div class="detail-row"><span class="detail-label">Получение:</span><span class="detail-value" th:text="${order.deliveryType}"></span></div>
        <div class="detail-row"><span class="detail-label">Адрес:</span><span class="detail-value" th:text="${order.deliveryAddress}"></span></div>
        <div class="detail-row"><span class="detail-label">Оплата:</span><span class="detail-value" th:text="${order.paymentMethod}"></span></div>
        <div class="detail-row" th:if="${order.comment != null and !order.comment.isEmpty()}"><span class="detail-label">Комментарий:</span><span class="detail-value" th:text="${order.comment}"></span></div>
        <div class="detail-row" th:if="${order.trackingNumber != null and !order.trackingNumber.isEmpty()}"><span class="detail-label">Трек-номер:</span><span class="detail-value" th:text="${order.trackingNumber}"></span></div>
    </div>

    <div class="card mb-4">
        <h3>Товары в заказе</h3>
        <div class="order-products-grid">
            <a th:href="@{/user/products/details/{id}(id=${item.product.id})}"
               class="order-product-card"
               th:each="item : ${order.orderItems}">
                <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}" class="order-product-image">
                <div class="order-product-info">
                    <h4 th:text="${item.product.name}"></h4>
                    <p class="price" th:text="${#numbers.formatDecimal(item.priceAtTime,0,2)} + ' ₽'"></p>
                    <p>Количество: <span th:text="${item.quantity}"></span> шт.</p>
                </div>
            </a>
        </div>
    </div>

    <div class="card">
        <div class="flex justify-between align-center">
            <h3>Итоговая сумма:</h3>
            <h2 class="price" th:text="${order.totalAmount} + ' ₽'"></h2>
        </div>
        <div th:if="${order.status.name() == 'NEW' or order.status.name() == 'PAID'}" class="mt-3">
            <form th:action="@{/order/cancel/{id}(id=${order.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-warning" onclick="return confirm('Отменить заказ?');">Отменить заказ</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
