<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки профиля | Vinyl</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-group .btn {
            flex: 1;
            text-align: center;
        }
        .btn-primary, .btn-outline-secondary {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-primary {
            background: #2c3e50;
            color: white;
        }
        .btn-primary:hover {
            background: #1a252f;
        }
        .btn-outline-secondary {
            background: transparent;
            border: 1px solid #2c3e50;
            color: #2c3e50;
        }
        .btn-outline-secondary:hover {
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container header-content">
        <a href="/user/products/catalog" class="logo">Vinyl</a>
    </div>
</header>

<div class="container">
    <h1>Настройки профиля</h1>

    <div th:if="${successMessage}" class="card" style="background: rgba(76,175,80,0.1); border-left:4px solid #4caf50; margin-bottom:20px;">
        <p style="color:#4caf50;margin:0;" th:text="${successMessage}"></p>
    </div>
    <div th:if="${errorMessage}" class="card" style="background: rgba(189,66,82,0.1); border-left:4px solid #bd4252; margin-bottom:20px;">
        <p style="color:#bd4252;margin:0;" th:text="${errorMessage}"></p>
    </div>

    <div class="form-container w-50">
        <form method="post" th:action="@{/user/profile/update}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label class="form-label">ФИО</label>
                <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" th:value="${user.email}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="tel" name="phone" class="form-control" th:value="${user.phone}" pattern="^(\+7|8)?\d{10}$" title="Введите номер: +7XXXXXXXXXX или 8XXXXXXXXXX">
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Сохранить изменения</button>
        </form>

        <!-- Смена пароля -->
        <div style="margin-top: 40px;">
            <h3>Смена пароля</h3>
            <form method="post" th:action="@{/user/change-password}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label">Старый пароль</label>
                    <div style="position: relative;">
                        <input type="password" id="oldPassword" name="oldPassword" class="form-control" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('oldPassword', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999;">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Новый пароль</label>
                    <div style="position: relative;">
                        <input type="password" id="newPassword" name="newPassword" class="form-control" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('newPassword', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999;">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <div id="password-strength" class="password-strength" style="margin-top:8px;">Введите пароль</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Повторите пароль</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999;">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <small id="password-match-hint" class="form-hint">Пароли должны совпадать</small>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-outline-secondary" onclick="generatePassword()">Сгенерировать пароль</button>
                    <button type="submit" class="btn btn-primary">Сменить пароль</button>
                </div>
            </form>
        </div>

        <div class="auth-links" style="margin-top: 20px;">
            <p><a href="/user/profile">← Вернуться в профиль</a></p>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    const passwordInput = document.getElementById("newPassword");
    const confirmInput = document.getElementById("confirmPassword");
    const strengthText = document.getElementById("password-strength");
    const matchHint = document.getElementById("password-match-hint");

    function checkPasswordStrength(value) {
        let score = 0;
        if (value.length >= 8) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[a-z]/.test(value)) score++;
        if (/\d/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;

        if (score <= 2) {
            strengthText.textContent = "Слабый пароль";
            strengthText.style.color = "#bd4252";
            return false;
        } else if (score <= 4) {
            strengthText.textContent = "Средний пароль";
            strengthText.style.color = "#ff9800";
            return true;
        } else {
            strengthText.textContent = "Надёжный пароль";
            strengthText.style.color = "#4caf50";
            return true;
        }
    }

    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        if (confirm.length === 0) {
            matchHint.textContent = "Повторите пароль";
            matchHint.style.color = "#6c757d";
            return false;
        }
        if (password === confirm) {
            matchHint.textContent = "Пароли совпадают";
            matchHint.style.color = "#4caf50";
            return true;
        } else {
            matchHint.textContent = "Пароли не совпадают";
            matchHint.style.color = "#bd4252";
            return false;
        }
    }

    if (passwordInput) {
        passwordInput.addEventListener("input", function() {
            checkPasswordStrength(passwordInput.value);
            checkPasswordMatch();
        });
    }
    if (confirmInput) {
        confirmInput.addEventListener("input", function() {
            checkPasswordMatch();
        });
    }

    function generatePassword() {
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*";
        const all = upper + lower + numbers + symbols;
        let password = "";
        password += upper[Math.floor(Math.random() * upper.length)];
        password += lower[Math.floor(Math.random() * lower.length)];
        password += numbers[Math.floor(Math.random() * numbers.length)];
        password += symbols[Math.floor(Math.random() * symbols.length)];
        for (let i = 0; i < 8; i++) {
            password += all[Math.floor(Math.random() * all.length)];
        }
        password = password.split("").sort(() => Math.random() - 0.5).join("");
        if (passwordInput) passwordInput.value = password;
        if (confirmInput) confirmInput.value = password;
        if (passwordInput) passwordInput.dispatchEvent(new Event("input"));
        if (confirmInput) confirmInput.dispatchEvent(new Event("input"));
    }
</script>
</body>
</html>
