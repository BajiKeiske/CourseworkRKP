<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Оформление заказа | Vinyl</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>
<header class="site-header">
  <div class="container header-content">
    <a href="/user/products/catalog" class="logo">Vinyl</a>
    <div class="user-nav">
      <a href="/user/products/catalog">Каталог</a>
      <a href="/basket">Корзина</a>
      <a href="/user/profile">Профиль</a>
      <form method="post"
            action="/logout"
            style="display:inline;">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <button type="submit"
                class="nav-link-btn">

          <i class="fas fa-sign-out-alt"></i>
          Выйти

        </button>

      </form>
    </div>
  </div>
</header>

<div class="container">
  <h1 class="checkout-title">Оформление заказа</h1>
  <form th:action="@{/order/checkout}" method="post">

    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">



    <div class="checkout-page">
      <!-- ЛЕВАЯ КОЛОНКА -->
      <div>

        <!-- Получатель -->
        <div class="checkout-card">
          <h3 class="checkout-section-title">
            Получатель
          </h3>
          <div class="form-group">
            <label>ФИО</label>
            <input type="text"
                   name="recipientName"
                   class="form-control"
                   th:value="${user.fullName}"
                   placeholder="Иванов Иван Иванович"
                   required>
          </div>
          <div class="form-group">
            <label>Телефон</label>
            <input type="tel"
                   name="phone"
                   class="form-control"
                   placeholder="+7 (999) 999-99-99"
                   required>
          </div>
        </div>

        <!-- Доставка -->
        <div class="checkout-card">
          <h3 class="checkout-section-title">
            Способ получения
          </h3>

          <label class="radio-card">
            <input type="radio"
                   name="deliveryType"
                   value="КУРЬЕР"
                   checked
                   onclick="toggleDeliveryAddress()">
            Курьерская доставка
          </label>

          <label class="radio-card">
            <input type="radio"
                   name="deliveryType"
                   value="САМОВЫВОЗ"
                   onclick="toggleDeliveryAddress()">
            Самовывоз
          </label>

          <div id="deliveryAddressBlock">

            <div class="form-group">
              <label>Город</label>
              <input type="text"
                     id="city"
                     class="form-control"
                     placeholder="Москва">
            </div>

            <div class="form-group">
              <label>Улица</label>
              <input type="text"
                     id="street"
                     class="form-control"
                     placeholder="Ленина">
            </div>

            <div style="display:flex; gap:10px;">
              <div class="form-group" style="flex:1;">
                <label>Дом</label>
                <input type="text"
                       id="house"
                       class="form-control"
                       placeholder="15">
              </div>

              <div class="form-group" style="flex:1;">
                <label>Квартира</label>
                <input type="text"
                       id="apartment"
                       class="form-control"
                       placeholder="24">
              </div>
            </div>

            <input type="hidden"
                   name="deliveryAddress"
                   id="deliveryAddress">

          </div>

          <div id="pickupInfo"
               style="display:none; margin-top:15px;">

            <strong>Адрес пункта самовывоза:</strong><br>
            г. Москва, ул. Центральная, д. 15

          </div>
        </div>

        <!-- Оплата -->
        <div class="checkout-card">
          <h3 class="checkout-section-title">
            Способ оплаты
          </h3>
          <select name="paymentMethod"
                  class="form-select"
                  required>
            <option value="">
              Выберите способ оплаты
            </option>
            <option value="КАРТА">
              Банковская карта
            </option>
            <option value="ПРИ ПОЛУЧЕНИИ">
              При получении
            </option>
          </select>
        </div>

        <!-- Комментарий -->
        <div class="checkout-card">
          <h3 class="checkout-section-title">
            Комментарий к заказу
          </h3>
          <textarea name="comment"
                    rows="4"
                    class="form-control"
                    placeholder="Например: позвонить за час до доставки"></textarea>
        </div>
      </div>

      <!-- ПРАВАЯ КОЛОНКА -->
      <div>
        <div class="checkout-card order-summary">
          <h3 class="checkout-section-title">
            Ваш заказ
          </h3>
          <div class="summary-product"
                     th:each="entry : ${basket.items}">
                    <span th:text="${entry.key.name}">
                      Товар
                    </span>
                  <span th:text="${#numbers.formatDecimal(entry.key.price * entry.value,0,2)} + ' ₽'">
                      0 ₽
            </span>
          </div>
          <div class="summary-total">
            Итого:
            <span th:text="${totalAmount}">
                            0
                        </span>
            ₽
          </div>
          <button type="submit"
                  class="btn btn-success btn-lg btn-order">
            Подтвердить заказ
          </button>
          <a href="/basket"
             class="btn btn-secondary btn-order">
            Вернуться в корзину
          </a>
        </div>
      </div>
    </div>
  </form>
</div>
<script>
  function toggleDeliveryAddress() {

      const courier =
          document.querySelector('input[name="deliveryType"]:checked').value === 'КУРЬЕР';

      document.getElementById('deliveryAddressBlock').style.display =
          courier ? 'block' : 'none';

      document.getElementById('pickupInfo').style.display =
          courier ? 'none' : 'block';
  }

  document.querySelector('form').addEventListener('submit', function () {

      const courier =
          document.querySelector('input[name="deliveryType"]:checked').value === 'КУРЬЕР';

      if (courier) {

          const city =
              document.getElementById('city').value;

          const street =
              document.getElementById('street').value;

          const house =
              document.getElementById('house').value;

          const apartment =
              document.getElementById('apartment').value;

          document.getElementById('deliveryAddress').value =
              city + ", ул. " + street +
              ", д. " + house +
              ", кв. " + apartment;

      } else {

          document.getElementById('deliveryAddress').value =
              "Самовывоз";
      }
  });

  toggleDeliveryAddress();
</script>
</body>
</html>
