<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль | Vinyl</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header class="site-header">
    <div class="container header-content">
        <a href="/user/products/catalog" class="logo">Vinyl</a>
        <div class="user-nav">
            <a href="/user/products/catalog"><i class="fas fa-store"></i> Каталог</a>
            <a href="/basket"><i class="fas fa-shopping-cart"></i> Корзина</a>
            <a href="/wishlist"><i class="fas fa-heart"></i> Избранное</a>
            <form method="post" action="/logout" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</header>

<div class="container">
    <!-- Шапка профиля с шестерёнкой -->
    <div class="profile-header" style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="/images/default-avatar.png" class="round-avatar" style="width: 80px; height: 80px; object-fit: cover;" alt="Аватар">
            <div class="profile-info">
                <h2 th:text="${user.username}"></h2>
                <p th:text="${user.email}"></p>
                <p th:text="${user.phone}"></p>
            </div>
        </div>
        <a href="/user/profile/edit" class="btn btn-secondary" style="font-size: 24px; padding: 10px 15px;">
            <i class="fas fa-cog"></i>
        </a>
    </div>

    <!-- Статистика -->
    <div class="profile-stats" style="display: flex; gap: 20px; margin: 30px 0;">
        <div class="stat-card" style="flex: 1; text-align: center; padding: 20px; background: #f5f5f5; border-radius: 12px;">
            <span class="stat-value" style="font-size: 28px; font-weight: bold;" th:text="${totalOrders}">0</span>
            <span class="stat-label" style="display: block; color: #666;">Всего заказов</span>
        </div>
        <div class="stat-card" style="flex: 1; text-align: center; padding: 20px; background: #f5f5f5; border-radius: 12px;">
            <span class="stat-value" style="font-size: 28px; font-weight: bold;" th:text="${#numbers.formatDecimal(totalSpent, 0, 2)} + ' ₽'">0 ₽</span>
            <span class="stat-label" style="display: block; color: #666;">Общая сумма</span>
        </div>
    </div>

    <!-- Быстрые ссылки -->
    <div class="profile-actions" style="display: flex; gap: 15px; margin-bottom: 30px;">
        <a href="/user/orders" class="btn btn-info btn-lg">Мои заказы</a>
    </div>
</div>
</body>
</html>
