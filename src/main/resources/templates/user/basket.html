<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Корзина | Vinyl</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <style>
    .basket-item { display: flex; gap: 20px; padding: 20px; border-bottom: 1px solid #eee; align-items: center; }
    .basket-image { width: 80px; height: 80px; object-fit: cover; }
    .basket-info { flex: 2; }
    .quantity-control { display: flex; align-items: center; gap: 10px; }
    .quantity-btn { width: 36px; height: 36px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 18px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; }
    .quantity-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .item-total { font-weight: bold; min-width: 100px; text-align: right; }
    .error-message { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .success-message { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .action-buttons { display: flex; gap: 15px; justify-content: flex-end; align-items: center; }
    .action-buttons .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; font-size: 16px; border-radius: 8px; text-decoration: none; cursor: pointer; border: none; font-weight: 500; min-width: 160px; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .flex { display: flex; }
    .justify-between { justify-content: space-between; }
    .align-center { align-items: center; }
    .mt-20 { margin-top: 20px; }
    .btn-sm { padding: 8px 16px; font-size: 14px; }
    .btn-danger { background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-danger:hover { background: #c82333; }
    .bundle-badge { background: #ff9800; color: white; font-size: 12px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
    .old-price { text-decoration: line-through; color: #999; margin-right: 8px; }
    .new-price { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="container header-content">
    <a href="/user/products/catalog" class="logo">Vinyl</a>
    <div class="user-nav">
      <a href="/user/products/catalog"><i class="fas fa-store"></i> Каталог</a>
      <a href="/user/profile"><i class="fas fa-user"></i> Профиль</a>
      <form method="post" action="/logout" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="nav-link-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
      </form>
    </div>
  </div>
</header>

<div class="container">
  <h1>Ваша корзина</h1>

  <div th:if="${errorMessage != null}" class="error-message" th:text="${errorMessage}"></div>
  <div th:if="${successMessage != null}" class="success-message" th:text="${successMessage}"></div>

  <!-- Корзина пуста -->
  <div th:if="${basket.cartItems == null or basket.cartItems.empty}" class="card text-center">
    <p style="font-size: 1.2em; color: #5a3a3f;">Корзина пуста</p>
    <a href="/user/products/catalog" class="btn btn-primary">Перейти в каталог</a>
  </div>

  <!-- Есть позиции -->
  <div th:unless="${basket.cartItems == null or basket.cartItems.empty}">
    <div class="basket-list">
      <div th:each="item : ${basket.cartItems}" class="basket-item">

        <!-- Блок для КОМПЛЕКТА -->
        <div th:if="${item.type == 'BUNDLE'}" style="display: contents;">
          <div class="basket-image-block">
            <img th:if="${item.bundle.imageUrl}" th:src="${item.bundle.imageUrl}" class="basket-image">
            <img th:unless="${item.bundle.imageUrl}" src="/images/placeholder.png" class="basket-image">
          </div>
          <div class="basket-info">
            <span class="bundle-badge">Комплект</span>
            <a th:href="@{/bundles/{id}(id=${item.bundle.id})}" style="text-decoration: none; color: inherit;">
              <h3 th:text="${item.bundle.name}"></h3>
            </a>
            <p class="bundle-description" th:text="${item.bundle.description}"></p>
            <div class="basket-price">
              <span class="old-price" th:text="${#numbers.formatDecimal(item.bundle.totalPrice,0,2)}"></span> руб.
              <span class="new-price" th:text="${#numbers.formatDecimal(item.priceAtAdd,0,2)}"></span> руб. (со скидкой)
            </div>
          </div>
          <div class="quantity-control">
            <span style="padding: 0 10px;"><span th:text="${item.quantity}"></span> шт.</span>
          </div>
          <div class="item-total">
            <span th:text="${#numbers.formatDecimal(item.priceAtAdd * item.quantity,0,2)}"></span> руб.
          </div>
          <div class="basket-actions">
            <form th:action="@{/basket/remove-cart-item/{id}(id=${item.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn-danger btn-sm">Удалить</button>
            </form>
          </div>
        </div>

        <!-- Блок для ОБЫЧНОГО ТОВАРА -->
        <div th:if="${item.type == 'PRODUCT'}" style="display: contents;">
          <div class="basket-image-block">
            <img th:if="${item.product.imageUrl}" th:src="${item.product.imageUrl}" class="basket-image">
            <img th:unless="${item.product.imageUrl}" src="/images/placeholder.png" class="basket-image">
          </div>
          <div class="basket-info">
            <a th:href="@{/user/products/details/{id}(id=${item.product.id})}" style="text-decoration: none; color: inherit;">
              <h3 th:text="${item.product.name}"></h3>
            </a>
            <p th:text="${item.product.brand != null ? item.product.brand.name : ''}"></p>
            <div class="basket-price">
              <span th:text="${#numbers.formatDecimal(item.priceAtAdd,0,2)}"></span> руб. / шт.
            </div>
            <div th:if="${item.product.stock < 5}" class="stock-info">Осталось: <span th:text="${item.product.stock}"></span> шт.</div>
          </div>
          <div class="quantity-control">
            <button type="button" class="quantity-btn"
                    th:data-id="${item.id}"
                    th:data-current="${item.quantity}"
                    th:data-stock="${item.product.stock}"
                    onclick="updateQuantity(this, 'minus')">−</button>
            <span style="min-width: 40px; text-align: center;" th:text="${item.quantity}"></span>
            <button type="button" class="quantity-btn"
                    th:data-id="${item.id}"
                    th:data-current="${item.quantity}"
                    th:data-stock="${item.product.stock}"
                    onclick="updateQuantity(this, 'plus')">+</button>
          </div>
          <div class="item-total">
            <span th:text="${#numbers.formatDecimal(item.priceAtAdd * item.quantity,0,2)}"></span> руб.
          </div>
          <div class="basket-actions">
            <form th:action="@{/basket/remove-cart-item/{id}(id=${item.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn-danger btn-sm">Удалить</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-20">
      <div class="flex justify-between align-center">
        <h3>Итого: <span th:text="${#numbers.formatDecimal(basket.totalAmount,0,2)}"></span> руб.</h3>
        <div class="action-buttons">
          <a href="/user/products/catalog" class="btn btn-secondary">Продолжить покупки</a>
          <form th:action="@{/basket/clear}" method="post" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-secondary">Очистить корзину</button>
          </form>
          <a href="/order/checkout" class="btn btn-success">Оформить заказ</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function updateQuantity(btn, action) {
      let itemId = btn.dataset.id;
      let currentQty = parseInt(btn.dataset.current);
      let stock = parseInt(btn.dataset.stock);

      let newQuantity = action === 'plus' ? currentQty + 1 : currentQty - 1;

      if (newQuantity < 1) return;
      if (newQuantity > stock) return;

      const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

      fetch('/basket/update-cart-item/' + itemId, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              [csrfHeader]: csrfToken
          },
          body: 'quantity=' + newQuantity
      }).then(response => {
          if (!response.ok) {
              alert('Ошибка');
          } else {
              location.reload();
          }
      });
  }
</script>
</body>
</html>
