<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Корзина | Vinyl</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header">
  <div class="container header-content">
    <a href="/user/products/catalog" class="logo">Vinyl</a>
    <div class="user-nav">
      <a href="/user/products/catalog">Каталог</a>
      <a href="/basket">Корзина</a>
      <a href="/user/profile">Профиль</a>
      <a href="/logout">Выйти</a>
    </div>
  </div>
</header>

<div class="container">
  <h1>Ваша корзина</h1>

  <div th:if="${basket.products.empty}" class="card text-center">
    <p style="font-size: 1.2em; color: #5a3a3f;">Корзина пуста</p>
    <a href="/user/products/catalog" class="btn btn-primary">Перейти в каталог</a>
  </div>

  <div th:unless="${basket.products.empty}">
    <div class="basket-list">
      <div class="basket-item"
           th:each="product : ${basket.products}">
        <div class="basket-image-block">
          <img th:src="${product.imageUrl}"
               alt="Фото товара"
               class="basket-image">
        </div>
        <div class="basket-info">
          <h3 th:text="${product.name}"></h3>
          <p class="basket-brand"
             th:text="${product.brand != null ? product.brand.name : ''}">
          </p>
          <div class="basket-price">
            <span th:text="${#numbers.formatDecimal(product.price,0,2)}"></span>
            руб.
          </div>
        </div>
        <div class="basket-actions">
          <a th:href="@{/user/products/details/{id}(id=${product.id})}"
             class="btn btn-secondary">
            Открыть
          </a>
          <form th:action="@{/basket/remove/{id}(id=${product.id})}"
                method="post">
            <button type="submit"
                    class="btn btn-danger">
              Удалить
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="flex justify-between align-center">
        <h3 style="margin: 0;">Итого: <span th:text="${totalPrice}">0</span> руб.</h3>
        <div class="flex gap-2">
          <a href="/user/products/catalog" class="btn btn-secondary">
            Продолжить покупки
          </a>
          <!-- ИЗМЕНЕНИЕ ЗДЕСЬ: ссылка вместо формы -->
          <a href="/order/checkout" class="btn btn-success btn-lg">
            Оформить заказ
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
