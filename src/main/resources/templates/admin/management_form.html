<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Форма</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-content">
        <div class="logo-area">
            <h3>Vinyl Admin</h3>
            <small>Вы вошли как: <span sec:authentication="name"></span></small>
        </div>
        <div class="nav-links">
            <a href="/admin/products" class="nav-link">Товары</a>
            <a href="/order/admin/all" class="nav-link">Заказы</a>
            <a href="/admin/users" class="nav-link">Пользователи</a>
            <a href="/admin/reviews" class="nav-link nav-link-with-badge">
                Отзывы
                <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
            </a>
            <a href="/admin/reports" class="nav-link">Отчёты</a>
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="back-button">
        <a th:href="${backUrl}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Назад</a>
    </div>

    <h1 th:text="${title}">Форма</h1>

    <form th:action="${actionUrl}" th:object="${item}" method="post" class="form-container" style="max-width: 600px;">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="name" class="form-label" th:text="'Название ' + ${itemName}"></label>
            <input type="text" th:field="*{name}" class="form-control" id="name" required>
        </div>

        <div class="mb-3" th:if="${itemType == 'category'}">
            <label for="parent" class="form-label">Родительская категория</label>
            <select th:field="*{parent.id}" class="form-control" id="parent">
                <option value="">-- Нет (корневая категория) --</option>
                <option th:each="cat : ${allCategories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == item.parent.id}">
                </option>
            </select>
            <div class="text-muted small">Если категория вложенная, выберите родителя</div>
        </div>

        <div class="form-group" th:if="${itemType == 'brand'}">
            <label for="country" class="form-label">Страна</label>
            <input type="text" th:field="*{country}" class="form-control" id="country">
        </div>

        <div class="flex gap-2" style="margin-top: 20px;">
            <button type="submit" class="btn btn-success" th:text="${buttonText}"></button>
            <a th:href="${backUrl}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
