<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Заказы | Админка</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-header">
  <div class="header-content">
    <div>
      <h4>Администратор — Заказы</h4>
    </div>
    <div>
      <a href="/admin/products" class="btn btn-outline-light btn-sm">Товары</a>
      <form method="post" action="/logout" style="display:inline; margin-left: 10px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="nav-link-btn btn btn-outline-danger btn-sm">Выйти</button>
      </form>
    </div>
  </div>
</div>

<div class="container">
  <h1>Заказы</h1>

  <div class="filters" style="margin-bottom: 20px;">
    <a href="/order/admin/all">Все</a>
    <a href="/order/admin/all?status=NEW">Новые</a>
    <a href="/order/admin/all?status=CONFIRMED">Подтверждённые</a>
    <a href="/order/admin/all?status=CANCELLED">Отменённые</a>
    <a href="/order/admin/all?status=COMPLETED">Завершённые</a>
  </div>

  <div class="page">
    <div class="orders">
      <div th:each="order : ${orders}"
           class="card-order"
           th:onclick="'window.location.href=\'/order/admin/all?open=' + ${order.id} + '\''">
        <div>
          <strong>Заказ #<span th:text="${order.id}"></span></strong>
          — <span th:text="${order.user.username}"></span>
        </div>
        <div>
          <span th:text="${order.totalAmount} + ' ₽'"></span>
        </div>
        <div>
          <span class="status" th:class="'status ' + ${order.status}" th:text="${order.status}"></span>
        </div>
        <small th:text="${order.orderDate}"></small>
      </div>
    </div>

    <div class="drawer" th:if="${selectedOrder != null}">
      <h3>Заказ #<span th:text="${selectedOrder.id}"></span></h3>
      <p><strong>Клиент:</strong> <span th:text="${selectedOrder.user.username}"></span></p>
      <p><strong>Телефон:</strong> <span th:text="${selectedOrder.phone}"></span></p>
      <p><strong>Адрес:</strong> <span th:text="${selectedOrder.deliveryAddress}"></span></p>
      <p><strong>Сумма:</strong> <span th:text="${selectedOrder.totalAmount} + ' ₽'"></span></p>
      <hr>
      <p><strong>Статус:</strong> <span class="status" th:class="'status ' + ${selectedOrder.status}" th:text="${selectedOrder.status}"></span></p>

      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <form th:if="${selectedOrder.status == 'NEW'}"
              th:action="@{/order/admin/{id}/confirm(id=${selectedOrder.id})}"
              method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn btn-success btn-sm">Подтвердить</button>
        </form>

        <form th:if="${selectedOrder.status != 'CANCELLED' and selectedOrder.status != 'COMPLETED'}"
              th:action="@{/order/admin/{id}/cancel(id=${selectedOrder.id})}"
              method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn btn-danger btn-sm">Отменить</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
