<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Модерация отзывов | Администрирование</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

<div class="admin-header">
    <div class="header-content">
        <div class="logo-area">
            <h3>Vinyl Admin</h3>
            <small>Вы вошли как: <span sec:authentication="name"></span></small>
        </div>
        <div class="nav-links">
            <a href="/admin/products" class="nav-link">Товары</a>
            <a href="/order/admin/all" class="nav-link">Заказы</a>
            <a href="/admin/users" class="nav-link">Пользователи</a>
            <a href="/admin/reviews" class="nav-link active nav-link-with-badge">
                Отзывы
                <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
            </a>
            <a href="/admin/reports" class="nav-link">Отчёты</a>
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="back-button">
        <a href="/admin/products" class="btn btn-secondary"><i class="fas fa-arrow-left"></i>Назад к товарам</a>
    </div>

    <h1>Модерация отзывов</h1>

    <div th:if="${not #lists.isEmpty(pendingReviews)}">
        <h3>На модерации (<span th:text="${pendingReviews.size()}"></span>)</h3>
        <div th:each="review : ${pendingReviews}" class="review-card" style="border:1px solid #ddd; padding:15px; margin-bottom:15px; border-radius:8px;">
            <div>
                <strong>Товар:</strong> <span th:text="${review.product.name}"></span>
            </div>
            <div>
                <strong>Пользователь:</strong> <span th:text="${review.user.username}"></span>
            </div>
            <div>
                <strong>Рейтинг:</strong>
                <span th:each="i : ${#numbers.sequence(1, 5)}">
                    <span th:if="${i <= review.rating}">★</span>
                    <span th:unless="${i <= review.rating}">☆</span>
                </span>
            </div>
            <div>
                <strong>Отзыв:</strong>
                <p th:text="${review.text}"></p>
            </div>
            <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <form th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-success btn-sm"><i class="fas fa-check"></i> Одобрить</button>
                </form>
                <form th:action="@{/admin/reviews/{id}/reject(id=${review.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="text" name="reason" placeholder="Причина отклонения" style="padding:5px; width:200px;" required>
                    <button type="submit" class="btn btn-danger btn-sm"><i class="fas fa-times"></i> Отклонить</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(pendingReviews)}">
        <p>Нет отзывов на модерации</p>
    </div>
</div>

</body>
</html>
