<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание комплекта | Администрирование</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-content">
        <div class="logo-area">
            <h3>Vinyl Admin</h3>
            <small>Вы вошли как: <span sec:authentication="name"></span></small>
        </div>
        <div class="nav-links">
            <a href="/admin/products" class="nav-link">Товары</a>
            <a href="/order/admin/all" class="nav-link">Заказы</a>
            <a href="/admin/users" class="nav-link">Пользователи</a>
            <a href="/admin/reviews" class="nav-link nav-link-with-badge">
                Отзывы
                <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
            </a>
            <a href="/admin/reports" class="nav-link">Отчёты</a>
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="back-button">
        <a href="/admin/bundles" class="btn btn-secondary"><i class="fas fa-arrow-left"></i>Назад к комплектам</a>
    </div>

    <h1>Создание комплекта</h1>

    <form method="post" th:action="@{/admin/bundles/create}" class="form-container" style="max-width: 800px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label class="form-label">Название комплекта *</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Изображение комплекта</label>
            <input type="file" name="imageFile" class="form-control" accept=".jpg,.jpeg,.png,.webp">
            <small class="text-muted">JPG, PNG, WEBP. Максимум 5 МБ.</small>
        </div>

        <div class="row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label class="form-label">Скидка (%)</label>
                <input type="number" name="discountPercent" class="form-control" step="1" min="0" max="100">
            </div>
            <div class="form-group">
                <label class="form-label">Скидка (₽)</label>
                <input type="number" name="discountValue" class="form-control" step="1" min="0">
            </div>
        </div>

        <div class="card" style="margin: 20px 0;">
            <h3>Выберите товары и количество</h3>
            <p class="text-muted">Оставьте 0 или пустое поле, если товар не нужен в комплекте</p>

            <div style="max-height: 400px; overflow-y: auto;">
                <div th:each="p : ${products}" class="bundle-product-row" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                    <div>
                        <strong th:text="${p.name}"></strong>
                        <span class="text-muted" style="font-size: 12px;"
                              th:text="' — ' + ${#numbers.formatDecimal(p.price, 0, 2)} + ' ₽'"></span>
                    </div>
                    <div>
                        <input type="number"
                               th:name="'products[' + ${p.id} + ']'"
                               class="form-control"
                               style="width: 100px;"
                               placeholder="кол-во"
                               min="0"
                               step="1"
                               value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-2" style="margin-top: 25px;">
            <button type="submit" class="btn btn-success">Создать комплект</button>
            <a href="/admin/bundles" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
