<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Управление</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-content">
        <div class="logo-area">
            <h3>Vinyl Admin</h3>
            <small>Вы вошли как: <span sec:authentication="name"></span></small>
        </div>
        <div class="nav-links">
            <a href="/admin/products" class="nav-link">Товары</a>
            <a href="/order/admin/all" class="nav-link">Заказы</a>
            <a href="/admin/users" class="nav-link">Пользователи</a>
            <a href="/admin/reviews" class="nav-link nav-link-with-badge">
                Отзывы
                <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
            </a>
            <a href="/admin/reports" class="nav-link">Отчёты</a>
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="back-button">
        <a href="/admin/products" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Назад к товарам</a>
    </div>

    <div class="flex justify-between align-center" style="margin-bottom: 25px;">
        <h1 th:text="${title}"></h1>
        <a th:href="${createUrl}" class="btn btn-primary" th:text="'+ Добавить ' + ${itemName}"></a>
    </div>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="'Название ' + ${itemName}"></th>
                <th th:if="${itemType == 'brand'}">Страна</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td>
                    <strong th:text="${item.name}"></strong>
                </td>
                <td th:if="${itemType == 'brand'}" th:text="${item.country}">—</td>
                <td>
                    <div class="btn-group">
                        <a th:href="${updateUrl} + '/' + ${item.id}"
                           class="btn btn-warning btn-sm">Редактировать</a>
                        <a th:href="${deleteUrl} + '/' + ${item.id}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Удалить?');">Удалить</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
