<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление комплектами | Администрирование</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
  <div class="header-content">
    <div class="logo-area">
      <h3>Vinyl Admin</h3>
      <small>Вы вошли как: <span sec:authentication="name"></span></small>
    </div>
    <div class="nav-links">
      <a href="/admin/products" class="nav-link">Товары</a>
      <a href="/order/admin/all" class="nav-link">Заказы</a>
      <a href="/admin/users" class="nav-link">Пользователи</a>
      <a href="/admin/reviews" class="nav-link nav-link-with-badge">
        Отзывы
        <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
      </a>
      <a href="/admin/reports" class="nav-link">Отчёты</a>
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
      </form>
    </div>
  </div>
</div>

<div class="container">
  <div class="flex justify-between align-center" style="margin-bottom: 25px;">
    <h1>Комплекты товаров</h1>
    <a th:href="@{/admin/bundles/create}" class="btn btn-primary">+ Создать комплект</a>
  </div>

  <div class="table-responsive">
    <table class="table">
      <thead>
      <tr>
        <th>ID</th>
        <th>Изображение</th>
        <th>Название</th>
        <th>Описание</th>
        <th>Кол-во товаров</th>
        <th>Скидка</th>
        <th>Цена</th>
        <th>Действия</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="b : ${bundles}">
        <td th:text="${b.id}"></td>
        <td>
          <img th:if="${b.imageUrl != null}"
               th:src="${b.imageUrl}"
               style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;">
          <span th:unless="${b.imageUrl != null}">—</span>
        </td>
        <td>
          <a th:href="@{/admin/bundles/{id}(id=${b.id})}"
             th:text="${b.name}"
             style="color: var(--primary); text-decoration: none;">
          </a>
        </td>
        <td th:text="${#strings.abbreviate(b.description, 60)}">?</td>
        <td th:text="${b.items != null ? b.items.size() : 0} + ' шт.'"></td>
        <td>
            <span th:if="${b.discountType == 'PERCENT'}"
                  th:text="'-' + ${b.discountValue} + '%'"></span>
          <span th:if="${b.discountType == 'FIXED'}"
                th:text="'-' + ${b.discountValue} + ' ₽'"></span>
          <span th:if="${b.discountType == null}">—</span>
        </td>
        <td th:text="${#numbers.formatDecimal(b.finalPrice, 0, 2)} + ' ₽'"></td>
        <td>
          <div class="btn-group">
            <a th:href="@{/admin/bundles/{id}(id=${b.id})}"
               class="btn btn-info btn-sm">Просмотр</a>
            <a th:href="@{/admin/bundles/edit/{id}(id=${b.id})}"
               class="btn btn-warning btn-sm">Редактировать</a>
            <form th:action="@{/admin/bundles/delete/{id}(id=${b.id})}"
                  method="post"
                  style="display:inline;"
                  th:data-bundle-name="${b.name}"
                  onsubmit="return confirmDelete(this);">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
            </form>
          </div>
        </td>
      </tr>
      <tr th:if="${bundles == null or bundles.isEmpty()}">
        <td colspan="8" style="text-align: center;">Нет созданных комплектов</td>
    </table>
    </tbody>
    </table>
  </div>
</div>

<script>
  function confirmDelete(form) {
      var bundleName = form.getAttribute('data-bundle-name');
      return confirm('Точно удалить комплект «' + bundleName + '»?');
  }
</script>

</body>
</html>
