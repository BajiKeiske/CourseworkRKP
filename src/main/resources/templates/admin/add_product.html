<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Добавить товар | Администрирование</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<div class="admin-header">
  <div class="header-content">
    <div class="logo-area">
      <h3>Vinyl Admin</h3>
      <small>Вы вошли как: <span sec:authentication="name"></span></small>
    </div>
    <div class="nav-links">
      <a href="/admin/products" class="nav-link active">Товары</a>
      <a href="/order/admin/all" class="nav-link">Заказы</a>
      <a href="/admin/users" class="nav-link">Пользователи</a>
      <a href="/admin/reviews" class="nav-link nav-link-with-badge">
        Отзывы
        <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
      </a>
      <a href="/admin/reports" class="nav-link">Отчёты</a>
      <form method="post" action="/logout" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
      </form>
    </div>
  </div>
</div>

<div class="container">
  <h1>Добавление нового товара</h1>

  <form th:action="@{/admin/products/create}"
        th:object="${product}"
        method="post"
        class="w-50"
        enctype="multipart/form-data">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div class="mb-3">
      <label for="name" class="form-label">Название товара *</label>
      <input type="text" th:field="*{name}" class="form-control" id="name" required>
      <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small mt-1"></div>
    </div>

    <div class="mb-3">
      <label for="category" class="form-label">Категория *</label>
      <select th:field="*{categoryId}" class="form-control" id="category" required>
        <option value="">-- Выберите категорию --</option>
        <th:block th:each="cat : ${categoryTree}">
          <option th:value="${cat.id}" th:text="${'—'.repeat(0) + cat.name}"></option>
          <th:block th:each="child : ${cat.children}">
            <option th:value="${child.id}" th:text="${'—'.repeat(1) + ' ' + child.name}"></option>
            <th:block th:each="grandChild : ${child.children}">
              <option th:value="${grandChild.id}" th:text="${'—'.repeat(2) + ' ' + grandChild.name}"></option>
            </th:block>
          </th:block>
        </th:block>
      </select>
    </div>

    <!-- Блок атрибутов категории -->
    <div id="attributes-block" style="margin-top: 20px; display: none;">
      <hr>
      <h4>Характеристики товара</h4>
      <div id="attributes-container"></div>
    </div>

    <div class="mb-3">
      <label for="brand" class="form-label">Бренд *</label>
      <select th:field="*{brandId}" class="form-control" id="brand" required>
        <option value="">-- Выберите бренд --</option>
        <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label for="price" class="form-label">Цена (руб.) *</label>
      <input type="number" th:field="*{price}" class="form-control" id="price" step="0.01" min="0.01" required>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Описание</label>
      <textarea th:field="*{description}" class="form-control" id="description" rows="4" maxlength="1000"></textarea>
      <div class="text-muted small">Осталось символов: <span id="chars-counter">1000</span></div>
    </div>

    <div class="mb-3">
      <label for="stock" class="form-label">Количество на складе *</label>
      <input type="number" th:field="*{stock}" class="form-control" id="stock" min="0" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Главное фото</label>
      <input type="file" name="imageFile" class="form-control" accept=".jpg,.jpeg,.png,.webp">
      <small class="text-muted">JPG, PNG, WEBP. Максимум 5 МБ.</small>
    </div>

    <div class="mb-3">
      <label class="form-label">Фото №2</label>
      <input type="file" name="imageFile2" class="form-control" accept=".jpg,.jpeg,.png,.webp">
    </div>

    <div class="mb-3">
      <label class="form-label">Фото №3</label>
      <input type="file" name="imageFile3" class="form-control" accept=".jpg,.jpeg,.png,.webp">
    </div>

    <div class="mb-3">
      <label class="form-label">Фото №4</label>
      <input type="file" name="imageFile4" class="form-control" accept=".jpg,.jpeg,.png,.webp">
    </div>

    <div class="mb-3">
      <button type="submit" class="btn btn-success">Добавить товар</button>
      <a th:href="@{/admin/products}" class="btn btn-secondary ms-2">Отмена</a>
    </div>
  </form>
</div>
<script>
  // Счётчик символов для описания
  const textarea = document.getElementById('description');
  const counter = document.getElementById('chars-counter');
  if (textarea && counter) {
      textarea.addEventListener('input', function() {
          const remaining = 1000 - this.value.length;
          counter.textContent = remaining;
          counter.style.color = remaining < 50 ? '#dc3545' : '#555';
      });

      // Инициализация при загрузке
      const remaining = 1000 - textarea.value.length;
      counter.textContent = remaining;
      counter.style.color = remaining < 50 ? '#dc3545' : '#555';
  }
</script>
</body>
</html>
