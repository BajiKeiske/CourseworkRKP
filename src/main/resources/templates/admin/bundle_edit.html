<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование комплекта | Администрирование</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-content">
        <div class="logo-area">
            <h3>Vinyl Admin</h3>
            <small>Вы вошли как: <span sec:authentication="name"></span></small>
        </div>
        <div class="nav-links">
            <a href="/admin/products" class="nav-link">Товары</a>
            <a href="/order/admin/all" class="nav-link">Заказы</a>
            <a href="/admin/users" class="nav-link">Пользователи</a>
            <a href="/admin/reviews" class="nav-link nav-link-with-badge">
                Отзывы
                <span th:if="${pendingReviewsCount > 0}" class="badge">[[${pendingReviewsCount}]]</span>
            </a>
            <a href="/admin/reports" class="nav-link">Отчёты</a>
            <form method="post" action="/logout" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="back-button">
        <a href="/admin/bundles" class="btn btn-secondary"><i class="fas fa-arrow-left"></i>Назад к комплектам</a>
    </div>

    <h1>Редактирование комплекта</h1>

    <form th:action="@{/admin/bundles/update/{id}(id=${bundleId})}"
          method="post"
          class="form-container"
          style="max-width: 800px;"
          enctype="multipart/form-data">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="id" th:value="${bundleId}">

        <div class="form-group">
            <label class="form-label">Название *</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   th:value="${bundle.name}"
                   required>
        </div>

        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description"
                      class="form-control"
                      rows="3"
                      th:text="${bundle.description}"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Текущее изображение</label>
            <div>
                <img th:if="${bundle.imageUrl != null && !#strings.isEmpty(bundle.imageUrl)}"
                     th:src="${bundle.imageUrl}"
                     style="max-width: 150px; max-height: 150px; border-radius: 8px; border: 1px solid #ddd; padding: 4px;">
                <div th:unless="${bundle.imageUrl != null && !#strings.isEmpty(bundle.imageUrl)}"
                     class="text-muted">Изображение не загружено</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Выбрать новое фото</label>
            <input type="file" name="imageFile" class="form-control" accept=".jpg,.jpeg,.png,.webp">
            <small class="text-muted">JPG, PNG, WEBP. Максимум 5 МБ. Оставьте пустым, чтобы не менять.</small>
        </div>

        <div class="row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label class="form-label">Тип скидки</label>
                <select name="discountType" class="form-control">
                    <option value="" th:selected="${bundle.discountType == null}">Нет скидки</option>
                    <option value="PERCENT" th:selected="${bundle.discountType == 'PERCENT'}">Проценты (%)</option>
                    <option value="FIXED" th:selected="${bundle.discountType == 'FIXED'}">Фикс (₽)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Значение скидки</label>
                <input type="number"
                       name="discountValue"
                       class="form-control"
                       step="0.01"
                       min="0"
                       th:value="${bundle.discountValue}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Дата начала акции</label>
            <input type="date" name="startDate" class="form-control" th:value="${bundle.startDate}">
        </div>
        <div class="mb-3">
            <label class="form-label">Дата окончания акции</label>
            <input type="date" name="endDate" class="form-control" th:value="${bundle.endDate}">
        </div>

        <hr style="margin: 20px 0;">

        <div class="card">
            <h3>Товары в комплекте</h3>

            <div style="max-height: 400px; overflow-y: auto;">
                <div th:each="p : ${products}"
                     style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
                    <div>
                        <strong th:text="${p.name}"></strong>
                        <span style="font-size:12px; color:#777;"
                              th:text="' — ' + ${#numbers.formatDecimal(p.price, 0, 2)} + ' ₽'">
                        </span>
                    </div>
                    <div>
                        <input type="number"
                               th:name="'products[' + ${p.id} + ']'"
                               class="form-control"
                               style="width:100px;"
                               min="0"
                               th:value="${bundleProducts[p.id] != null ? bundleProducts[p.id] : 0}">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-2" style="margin-top: 25px;">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/admin/bundles" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
