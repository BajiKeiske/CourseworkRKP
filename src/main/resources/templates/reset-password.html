<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля | Vinyl</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="site-header">
    <div class="container header-content">
        <a href="/user/products/catalog" class="logo">Vinyl</a>
        <div class="user-nav">
            <a href="/login">Войти</a>
            <a href="/register">Регистрация</a>
        </div>
    </div>
</header>

<div class="container">
    <h1>Восстановление пароля</h1>

    <!-- Блок с ошибкой -->
    <div th:if="${error}"
         class="card"
         style="background: rgba(189,66,82,0.1);
                border-left:4px solid #bd4252;
                margin-bottom:20px;">
        <p style="color:#bd4252;margin:0;" th:text="${error}"></p>
    </div>

    <!-- Блок с успехом -->
    <div th:if="${success}"
         class="card"
         style="background: rgba(76,175,80,0.1);
                border-left:4px solid #4caf50;
                margin-bottom:20px;">
        <p style="color:#4caf50;margin:0;" th:text="${success}"></p>
    </div>

    <div class="form-container w-50">
        <form method="post" th:action="@{/reset-password}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Код подтверждения -->
            <div class="form-group">
                <label for="code" class="form-label">
                    Код подтверждения из письма
                </label>
                <div style="position: relative;">
                    <input type="text"
                           id="code"
                           name="code"
                           class="form-control"
                           maxlength="6"
                           placeholder="Введите 6-значный код"
                           pattern="[0-9]{6}"
                           required>
                </div>
                <small class="form-hint">
                    Введите код, который мы отправили на вашу почту
                </small>
            </div>

            <!-- Новый пароль -->
            <div class="form-group">
                <label for="password" class="form-label">
                    Новый пароль
                </label>
                <div style="position: relative;">
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           required>
                    <button type="button"
                            onclick="togglePassword('password', this)"
                            class="password-toggle">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <small class="form-hint">
                    Минимум 8 символов, большая и маленькая буква, цифра, спецсимвол
                </small>
                <div id="password-strength" class="password-strength" style="margin-top:8px;">
                    Введите пароль
                </div>
                <button type="button"
                        class="btn btn-outline-secondary btn-sm"
                        style="margin-top:10px;"
                        onclick="generatePassword()">
                    Сгенерировать надёжный пароль
                </button>
            </div>

            <!-- Повтор пароля -->
            <div class="form-group">
                <label for="confirmPassword" class="form-label">
                    Повторите новый пароль
                </label>
                <div style="position: relative;">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           class="form-control"
                           required>
                    <button type="button"
                            onclick="togglePassword('confirmPassword', this)"
                            class="password-toggle">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <small class="form-hint" id="password-match-hint">
                    Пароли должны совпадать
                </small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                Сменить пароль
            </button>
        </form>

        <div class="auth-links" style="margin-top: 20px;">
            <p>
                <a href="/forgot-password">← Запросить новый код</a>
            </p>
            <p>
                <a href="/login">Вернуться ко входу</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Показать/скрыть пароль с иконками
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // Проверка сложности пароля
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const strengthText = document.getElementById("password-strength");
    const matchHint = document.getElementById("password-match-hint");

    function checkPasswordStrength(value) {
        let score = 0;
        if (value.length >= 8) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[a-z]/.test(value)) score++;
        if (/\d/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;

        if (score <= 2) {
            strengthText.textContent = "Слабый пароль";
            strengthText.style.color = "#bd4252";
            return false;
        } else if (score <= 4) {
            strengthText.textContent = "Средний пароль";
            strengthText.style.color = "#ff9800";
            return true;
        } else {
            strengthText.textContent = "Надёжный пароль";
            strengthText.style.color = "#4caf50";
            return true;
        }
    }

    function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (confirm.length === 0) {
            matchHint.textContent = "Повторите пароль";
            matchHint.style.color = "#6c757d";
            return false;
        }

        if (password === confirm) {
            matchHint.textContent = "Пароли совпадают";
            matchHint.style.color = "#4caf50";
            return true;
        } else {
            matchHint.textContent = "Пароли не совпадают";
            matchHint.style.color = "#bd4252";
            return false;
        }
    }

    passwordInput.addEventListener("input", function() {
        checkPasswordStrength(passwordInput.value);
        checkPasswordMatch();
    });

    confirmInput.addEventListener("input", function() {
        checkPasswordMatch();
    });

    // Генерация надёжного пароля
    function generatePassword() {
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*";
        const all = upper + lower + numbers + symbols;

        let password = "";
        password += upper[Math.floor(Math.random() * upper.length)];
        password += lower[Math.floor(Math.random() * lower.length)];
        password += numbers[Math.floor(Math.random() * numbers.length)];
        password += symbols[Math.floor(Math.random() * symbols.length)];

        for (let i = 0; i < 8; i++) {
            password += all[Math.floor(Math.random() * all.length)];
        }

        password = password.split("").sort(() => Math.random() - 0.5).join("");

        passwordInput.value = password;
        confirmInput.value = password;
        passwordInput.dispatchEvent(new Event("input"));
        confirmInput.dispatchEvent(new Event("input"));
    }

    // Валидация перед отправкой
    document.querySelector("form").addEventListener("submit", function(e) {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (password !== confirm) {
            e.preventDefault();
            matchHint.textContent = "Пароли не совпадают";
            matchHint.style.color = "#bd4252";
            alert("Пароли не совпадают");
            return false;
        }

        const score = (password.length >= 8 ? 1 : 0) +
                      (/[A-Z]/.test(password) ? 1 : 0) +
                      (/[a-z]/.test(password) ? 1 : 0) +
                      (/\d/.test(password) ? 1 : 0) +
                      (/[^A-Za-z0-9]/.test(password) ? 1 : 0);

        if (score <= 2) {
            e.preventDefault();
            alert("Пароль слишком слабый. Используйте минимум 8 символов, заглавные и строчные буквы, цифры и спецсимволы.");
            return false;
        }

        return true;
    });
</script>
</body>
</html>
