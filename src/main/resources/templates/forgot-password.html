<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля | Vinyl</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<header class="site-header">
    <div class="container header-content">
        <a href="/" class="logo">
            Vinyl
        </a>
        <div class="user-nav">
            <a href="/login">
                Войти
            </a>
            <a href="/register">
                Регистрация
            </a>
        </div>
    </div>
</header>

<div class="container">
    <div class="form-container w-50">
        <h1>
            Восстановление пароля
        </h1>
        <p class="text-muted"
           style="margin-bottom: 25px;">

            Введите email вашего аккаунта.
            Мы отправим код подтверждения
            для восстановления пароля.

        </p>

        <div th:if="${error}"
             class="card"
             style="
             background: rgba(189,66,82,0.1);
             border-left: 4px solid #bd4252;
             margin-bottom: 20px;">

            <p style="margin:0; color:#bd4252;"
               th:text="${error}">
            </p>

        </div>

        <div th:if="${success}"
             class="card"
             style="
             background: rgba(80,200,120,0.1);
             border-left: 4px solid #50c878;
             margin-bottom: 20px;">

            <p style="margin:0; color:#50c878;">

                Код отправлен на вашу почту

            </p>

        </div>

        <form method="post"
              th:action="@{/forgot-password}">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="form-group">

                <label for="email"
                       class="form-label">

                    Email

                </label>

                <input type="email"
                       id="email"
                       name="email"
                       class="form-control"
                       placeholder="example@mail.ru"
                       required>
            </div>
            <button type="submit"
                    class="btn btn-primary btn-lg">
                Отправить код
            </button>
        </form>
        <div class="auth-links"
             style="margin-top: 20px;">

            <a href="/login">
                ← Вернуться ко входу
            </a>
        </div>
    </div>
</div>
</body>
</html>
